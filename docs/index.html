<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公众号文章提取结果</title>
    <style>
      :root {
        --bg: #f4efe5;
        --paper: rgba(255, 252, 246, 0.9);
        --ink: #1d1a17;
        --muted: #6f655d;
        --accent: #c65d2e;
        --accent-soft: #f0c7a8;
        --line: rgba(29, 26, 23, 0.1);
        --shadow: 0 24px 60px rgba(50, 34, 22, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Songti SC", "STSong", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(198, 93, 46, 0.22), transparent 28%),
          radial-gradient(circle at top right, rgba(99, 137, 104, 0.18), transparent 26%),
          linear-gradient(180deg, #f7f1e9 0%, #efe5d8 100%);
        min-height: 100vh;
      }
      .shell {
        width: min(1120px, calc(100vw - 32px));
        margin: 32px auto 56px;
      }
      .hero {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }
      .eyebrow {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(198, 93, 46, 0.1);
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 16px 0 14px;
        font-size: clamp(32px, 5vw, 58px);
        line-height: 1.05;
      }
      .meta, .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 12px 0 0;
        padding: 0;
        list-style: none;
      }
      .meta li, .stats li {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.6);
        color: var(--muted);
      }
      .layout {
        display: grid;
        grid-template-columns: 1.35fr 0.85fr;
        gap: 24px;
        margin-top: 24px;
      }
      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 22px;
        box-shadow: var(--shadow);
      }
      .card h2 {
        margin: 0 0 16px;
        font-size: 22px;
      }
      .summary {
        font-size: 18px;
        line-height: 1.7;
        color: #2f2823;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 14px;
        text-decoration: none;
        border: 1px solid transparent;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .button.primary {
        background: var(--accent);
        color: #fff8f1;
        box-shadow: 0 12px 30px rgba(198, 93, 46, 0.28);
      }
      .button.ghost {
        border-color: var(--line);
        color: var(--ink);
        background: rgba(255, 255, 255, 0.72);
      }
      .button:hover { transform: translateY(-1px); }
      .media-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .thumb {
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #fff;
      }
      .thumb img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        display: block;
      }
      .thumb figcaption {
        padding: 10px 12px;
        font-size: 13px;
        color: var(--muted);
      }
      .video-list, .text-block {
        display: grid;
        gap: 12px;
      }
      .video-item, .text-block p {
        margin: 0;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
      }
      .footer-note {
        margin-top: 20px;
        color: var(--muted);
        font-size: 14px;
      }
      .loading, .error {
        padding: 18px;
        border-radius: 18px;
        border: 1px dashed var(--line);
      }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .media-grid { grid-template-columns: 1fr; }
        .hero, .card { border-radius: 20px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <span class="eyebrow">WeChat Link Extractor</span>
        <div id="app">
          <div class="loading">正在加载提取结果...</div>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
